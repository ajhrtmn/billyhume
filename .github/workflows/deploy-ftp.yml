name: Deploy plugins to live FTP

# Fires only on pushes to the `stable` branch — the deliberate-release branch.
# `dev` and `master` never trigger this; a live site only updates when work
# is explicitly promoted to `stable`.
on:
  push:
    branches:
      - stable

# Only these are the ecosystem's own plugins. Everything else in
# wp-content/plugins (woocommerce, advanced-media-offloader, query-monitor,
# any other third-party plugin) is deliberately never touched by this
# workflow — Billy manages those himself via wp-admin/WordPress.org.
env:
  PLUGIN_FOLDERS: >-
    own-ur-shit
    bh-contest
    bh-courses
    bh-crm
    bh-monetization-woo
    bh-registry
    bh-streaming

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Stage only the seven ecosystem plugin folders into a clean directory
      # so the FTP sync step below can never touch anything else, even if
      # PLUGIN_FOLDERS is edited incorrectly later.
      - name: Stage ecosystem plugins only
        run: |
          set -euo pipefail
          mkdir -p deploy_staging
          for plugin in $PLUGIN_FOLDERS; do
            src="wp-content/plugins/$plugin"
            if [ ! -d "$src" ]; then
              echo "::error::Expected plugin folder missing: $src"
              exit 1
            fi
            cp -r "$src" "deploy_staging/$plugin"
          done
          echo "Staged folders:"
          ls deploy_staging

      # PLACEHOLDERS — replace once real credentials exist for Billy's host.
      # Add these as GitHub Secrets (Settings > Secrets and variables >
      # Actions) before this workflow can actually deploy anything:
      #   FTP_SERVER    e.g. ftp.billyhumemusic.com
      #   FTP_USERNAME  the shared-hosting FTP account
      #   FTP_PASSWORD  the shared-hosting FTP password
      #   FTP_REMOTE_PLUGINS_PATH  e.g. /public_html/wp-content/plugins/
      - name: Deploy to FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./deploy_staging/
          server-dir: ${{ secrets.FTP_REMOTE_PLUGINS_PATH }}
          exclude: |
            **/.git*
            **/.git*/**
